server:
  port: 8081

aliyun:
  oss:
    endpoint: http://oss-cn-shenzhen.aliyuncs.com
    accessKeyId: ${secrets.aliyun.oss.access-key-id}
    accessKeySecret: ${secrets.aliyun.oss.access-key-secret}
    bucketName: ${secrets.aliyun.oss.bucket-name}

logging:
  level:
    root: INFO
  file:
    name: isdp.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"


